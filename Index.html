<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Search Skill</title>
    <script>
        window.ai_edge_gallery_get_result = async (input) => {
            try {
                let data = typeof input === 'string' ? JSON.parse(input) : input;
                const query = (data.query || '').trim();

                if (!query) {
                    return { text: "Error: No search query was provided." };
                }

                const encodedQuery = encodeURIComponent(query);
                const searchUrl = `https://www.startpage.com/do/dsearch?query=${encodedQuery}&cat=web&pl=ext&language=english`;

                const response = await fetch(searchUrl, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (compatible; AI-Edge-Gallery-WebSearch/1.0)'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const html = await response.text();

                const results = [];
                const titleRegex = /<h3[^>]*class="[^"]*title[^"]*"[^>]*>.*?<a[^>]+href="([^"]+)"[^>]*>(.*?)<\/a>/gis;
                const snippetRegex = /<p[^>]*class="[^"]*description[^"]*"[^>]*>(.*?)<\/p>/gis;

                const titles = [...html.matchAll(titleRegex)];
                const snippets = [...html.matchAll(snippetRegex)];

                const maxResults = Math.min(6, titles.length);

                for (let i = 0; i < maxResults; i++) {
                    if (titles[i]) {
                        let url = titles[i][1];
                        let title = titles[i][2].replace(/<[^>]+>/g, '').trim();
                        let snippet = snippets[i] ? 
                            snippets[i][1].replace(/<[^>]+>/g, '').trim() : 
                            "No preview available.";

                        if (!url.startsWith('http')) {
                            url = 'https://www.startpage.com' + url;
                        }

                        results.push({ title, url, snippet: snippet.substring(0, 220) + (snippet.length > 220 ? '...' : '') });
                    }
                }

                if (results.length === 0) {
                    return { 
                        text: `I searched Startpage for "${query}" but couldn't find any results.` 
                    };
                }

                let output = `**🔍 Web Search Results for:** "${query}"\n\n`;

                results.forEach((r, index) => {
                    output += `${index + 1}. **${r.title}**\n`;
                    output += `${r.snippet}\n`;
                    output += `[→ Read more](${r.url})\n\n`;
                });

                output += `\n*Results from Startpage • Privacy-focused search engine*`;

                return { text: output };

            } catch (error) {
                console.error("Web Search Skill Error:", error);
                return { 
                    text: `Sorry, the web search failed. Please try again.\n\nError: ${error.message}` 
                };
            }
        };
    </script>
</head>
<body></body>
</html>
